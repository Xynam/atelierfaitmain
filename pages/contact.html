<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — L'Atelier Fait Main</title>
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/contact.css" />
</head>
<body>
  <nav class="nav">
    <div class="nav__inner container">
      <a href="../index.html" class="nav__logo">L'Atelier Fait Main</a>
      <ul class="nav__links">
        <li><a href="../index.html" class="nav__link">Accueil</a></li>
        <li><a href="contact.html" class="nav__link nav__link--active">Contact</a></li>
      </ul>
    </div>
  </nav>

  <section class="page-hero">
    <div class="container">
      <span class="eyebrow">Me contacter</span>
      <h1>Parlons de votre <em>projet</em></h1>
    </div>
  </section>

  <section class="contact-section">
    <div class="container contact-grid">
      <aside class="contact-info">
        <h3>L'Atelier</h3>
        <p>Une question ? Une envie particulière ? Je réponds à chaque message avec attention.</p>
        <div class="info-item">
          <span>Email</span>
          <a href="mailto:votre-email@exemple.com">votre-email@exemple.com</a>
        </div>
      </aside>

      <div class="form-container">
        <form id="contactForm" action="https://formspree.io/f/mqakpjne" method="POST">
          <div class="form-row">
            <div class="form-group">
              <label>Nom</label>
              <input type="text" name="name" required placeholder="Ex: Jean Martin">
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" name="_replyto" required placeholder="Ex: jean@mail.com">
            </div>
          </div>
          
          <div class="form-group">
            <label>Type de projet</label>
            <select name="type">
              <option value="illustration">Illustration</option>
              <option value="peinture">Peinture</option>
              <option value="autre">Autre</option>
            </select>
          </div>

          <div class="form-group">
            <label>Message</label>
            <textarea name="message" rows="6" required placeholder="Décrivez votre idée..."></textarea>
          </div>

          <button type="submit" class="btn-submit" id="submitBtn">
            <span>Envoyer le message</span>
          </button>
          
          <div id="formStatus" class="form-status"></div>
        </form>
      </div>
    </div>
  </section>

  <script src="../assets/js/contact.js"></script>
</body>
</html>
