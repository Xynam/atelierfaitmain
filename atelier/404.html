<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page introuvable — L'Atelier Fait Main</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Jost:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <style>
    .notfound { min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:var(--space-xl); }
    .notfound__num { font-family:var(--font-display); font-size:clamp(6rem,20vw,11rem); font-weight:300; font-style:italic; color:var(--accent); line-height:1; margin-bottom:var(--space-md); opacity:0.5; }
    .notfound h2 { font-family:var(--font-display); font-size:1.8rem; font-weight:400; font-style:italic; color:var(--text); margin-bottom:var(--space-sm); }
    .notfound p { color:var(--text-muted); margin-bottom:var(--space-xl); font-size:0.9rem; }
  </style>
</head>
<body>
  <div class="notfound">
    <div>
      <div class="notfound__num">404</div>
      <h2>Page introuvable</h2>
      <p>Cette page n'existe pas ou a été déplacée.</p>
      <a href="index.html" class="btn btn--dark">← Retour à l'accueil</a>
    </div>
  </div>
</body>
</html>
